name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: [ '1.23.6', '1.25.0' ]
        os: [ ubuntu-24.04, macos-14, windows-2022 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: go.mod

      - name: Download modules
        run: go mod download

      - name: Check formatting
        shell: bash
        run: |
          test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Vet
        run: go vet ./...

      - name: Lint
        if: matrix.os == 'ubuntu-24.04' && matrix.go == '1.23.6'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Test
        run: go test -race ./...
