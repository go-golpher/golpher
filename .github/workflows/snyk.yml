name: Snyk

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '17 7 * * 1'

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true
          cache-dependency-path: go.mod

      - name: Run Snyk Open Source
        uses: snyk/actions/golang@v1.0.0
        with:
          args: --severity-threshold=high
