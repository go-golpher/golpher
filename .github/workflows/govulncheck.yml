name: Govulncheck

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '22 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.6'
          cache: true
          cache-dependency-path: go.mod

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
